..." disabled><button class="btn-send" onclick="sendMessage()" id="sendBtn" disabled>إرسال</button></div></div></div><script>
const firebaseConfig={apiKey:"AIzaSyAxoM2NXN8hOYFf4K7m7TxAnI8vZN1een0",authDomain:"relaxlive-56cdf.firebaseapp.com",projectId:"relaxlive-56cdf",storageBucket:"relaxlive-56cdf.firebasestorage.app",messagingSenderId:"502000959192",appId:"1:502000959192:web:f2116c2e4a293d0e2861ad"};
firebase.initializeApp(firebaseConfig);const db=firebase.firestore();const PATH="networks/63FA05FB82D7";let guestId=null;let currentUser='';let unsubscribe=null;let lastMessageCount=0;let welcomeSent=false;const errorPopup=document.getElementById('errorPopup');const nameScreen=document.getElementById('name-screen');const chatScreen=document.getElementById('chat-screen');const messagesContainer=document.getElementById('messages-container');const messageInput=document.getElementById('message-input');const sendBtn=document.getElementById('sendBtn');function showError(message,isWarning){if(!errorPopup)return;errorPopup.style.background=isWarning?'#f59e0b':'#dc2626';errorPopup.innerHTML=message;errorPopup.className='error-popup show';setTimeout(()=>errorPopup.className='error-popup',3000);}function setInputEnabled(enabled){messageInput.disabled=!enabled;sendBtn.disabled=!enabled;}function formatTime(timestamp){if(!timestamp)return'';const date=timestamp.toDate?timestamp.toDate():new Date(timestamp);const hours=date.getHours();const minutes=date.getMinutes();const ampm=hours>=12?'م':'ص';let h=hours%12;h=h?h:12;const m=minutes<10?'0'+minutes:minutes;return h+':'+m+' '+ampm;}function validateAndStart(){const name=document.getElementById('guest-name').value.trim();if(name===''){showError('✖ من فضلك اكتب اسمك أولاً',true);return false;}if(name.length<2){showError('✖ الاسم يجب أن يكون حرفين على الأقل',true);return false;}startChat(name);}function sendWelcomeMessage(){if(welcomeSent)return;const hour=new Date().getHours();const greeting=(hour>=5&&hour<12)?'صباح الخير':'مساء الخير';const welcomeText=greeting+' يا '+currentUser+'، شكراً لتواصلك. سيتم الرد عليك في أقرب وقت ممكن من قبل فريق الدعم.';db.collection(PATH+"/conversations").doc(guestId).collection("messages").add({text:welcomeText,from:"admin",createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{welcomeSent=true;db.collection(PATH+"/conversations").doc(guestId).update({welcomeSent:true,lastText:welcomeText,lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),lastFrom:"admin"});displayMessage({from:"admin",text:welcomeText,createdAt:new Date().toISOString()});});}async function checkExistingConversation(name){const savedId=localStorage.getItem('guest_id');const savedName=localStorage.getItem('guest_name');if(savedId){guestId=savedId;try{const doc=await db.collection(PATH+"/conversations").doc(savedId).get();if(doc.exists){const data=doc.data();let firebaseName=data.name||data.fields?.name?.stringValue||null;if(firebaseName){currentUser=firebaseName;}else{currentUser=name;}if(firebaseName!==name){await doc.ref.update({name:name});localStorage.setItem('guest_name',name);currentUser=name;}welcomeSent=data.welcomeSent||false;openExistingChat();}else{createNewConversation(name);}}catch(e){createNewConversation(name);}return true;}return false;}function openExistingChat(){nameScreen.style.display='none';chatScreen.style.display='flex';document.getElementById('chat-header').innerHTML='مرحباً بك يا '+currentUser+' - في خدمة عملاء شبكة ريلاكس';loadMessages();setInputEnabled(true);}function createNewConversation(name){currentUser=name;guestId='g_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();localStorage.setItem('guest_id',guestId);localStorage.setItem('guest_name',name);nameScreen.style.display='none';chatScreen.style.display='flex';document.getElementById('chat-header').innerHTML='مرحباً '+name+' - خدمة عملاء ريلاكس';db.collection(PATH+"/conversations").doc(guestId).set({name:name,startedAt:firebase.firestore.FieldValue.serverTimestamp(),lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),lastFrom:"guest",lastSeen:firebase.firestore.FieldValue.serverTimestamp(),welcomeSent:false}).then(()=>{setInputEnabled(true);loadMessages();}).catch(()=>{showError('خطأ في الاتصال، سيتم استخدام الوضع المحلي');setInputEnabled(true);loadMessages();});}function startChat(name){checkExistingConversation(name).then(exists=>{if(!exists)createNewConversation(name);});}function loadMessages(){if(guestId){if(unsubscribe)unsubscribe();unsubscribe=db.collection(PATH+"/conversations").doc(guestId).collection("messages").orderBy("createdAt","asc").onSnapshot(snapshot=>{messagesContainer.innerHTML='';let msgs=[];snapshot.forEach(doc=>{const msg=doc.data();msgs.push(msg);displayMessage(msg);if(msg.from==='admin'&&!welcomeSent)welcomeSent=true;});lastMessageCount=msgs.length;messagesContainer.scrollTop=messagesContainer.scrollHeight;snapshot.docChanges().forEach(change=>{if(change.type==='added'&&change.doc.data().from!=='guest'){try{new Audio('data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwNAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAAD5QD///////////////////////////////////////////8AAAA8TEFNRTMuMTAwAQAAAAAAAAAAABQAJAUEQwAAgAAAA+Xl5eXlAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//sQZAAP8AAAaQAAAAgAAA0gAAABAAABpAAAACAAADSAAAAETEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV').play();}catch(e){}}});});}}function displayMessage(msg){const sender=msg.from||'system';const text=msg.text||'';const timeStr=formatTime(msg.createdAt);const wrapper=document.createElement('div');wrapper.className='message-wrapper '+(sender==='guest'?'guest':'admin');const bubble=document.createElement('div');bubble.className='message-bubble';bubble.innerHTML=String(text).replace(/\n/g,'<br>');if(timeStr){const timeDiv=document.createElement('div');timeDiv.className='message-time';timeDiv.innerHTML=timeStr;bubble.appendChild(timeDiv);}wrapper.appendChild(bubble);messagesContainer.appendChild(wrapper);}function sendMessage(){const text=messageInput.value.trim();if(text===''){showError('✖ اكتب شيئاً للإرسال',true);return;}if(!guestId){showError('حدث خطأ، يرجى إعادة تحميل الصفحة');return;}setInputEnabled(false);db.collection(PATH+"/conversations").doc(guestId).collection("messages").add({text:text,from:"guest",createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{messageInput.value='';db.collection(PATH+"/conversations").doc(guestId).update({lastMessageAt:firebase.firestore.FieldValue.serverTimestamp(),lastFrom:"guest",lastSeen:firebase.firestore.FieldValue.serverTimestamp(),lastText:text});setInputEnabled(true);messageInput.focus();displayMessage({from:"guest",text:text,createdAt:new Date().toISOString()});lastMessageCount++;if(!welcomeSent)sendWelcomeMessage();}).catch(()=>{showError('فشل إرسال الرسالة، حاول مرة أخرى');setInputEnabled(true);});}function setupEnterKey(){messageInput.onkeypress=(e)=>{if(e.key==='Enter'){e.preventDefault();sendMessage();}};}window.onload=()=>{const savedName=localStorage.getItem('guest_name');const savedId=localStorage.getItem('guest_id');if(savedName&&savedId){startChat(savedName);}else{document.getElementById('guest-name').value=savedName||'';}setupEnterKey();};
